version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kgk-postgres
    restart: always
    environment:
      POSTGRES_DB: kgkreport
      POSTGRES_USER: kgkadmin
      POSTGRES_PASSWORD: KgkReport@2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: kgk-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kgkadmin:KgkReport%402024@postgres:5432/kgkreport
      - SECRET_KEY=${SECRET_KEY:-kgk-secret-key-change-in-production-2024}
      - CORS_ORIGINS=http://localhost,http://localhost:80
    volumes:
      - ./backend:/app

  nginx:
    image: nginx:alpine
    container_name: kgk-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  postgres_data:
